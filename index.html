<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Explorer</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header>
      <h1>🎬 Movie Explorer</h1>
      <div class="header-controls">
        <input type="text" id="search" placeholder="Search movies..." />
        <button id="theme-toggle" class="theme-btn" title="Toggle theme">☀️</button>
      </div>
    </header>

    <!-- Genre Filter -->
    <div class="genre-bar" id="genre-bar">
      <button class="genre-btn active" data-id="">All</button>
      <button class="genre-btn" data-id="28">Action</button>
      <button class="genre-btn" data-id="35">Comedy</button>
      <button class="genre-btn" data-id="18">Drama</button>
      <button class="genre-btn" data-id="27">Horror</button>
      <button class="genre-btn" data-id="878">Sci-Fi</button>
      <button class="genre-btn" data-id="10749">Romance</button>
      <button class="genre-btn" data-id="16">Animation</button>
      <button class="genre-btn" data-id="53">Thriller</button>
    </div>

    <!-- Rating Filter -->
    <div class="filter-bar">
      <label for="rating-filter">⭐ Min Rating:</label>
      <select id="rating-filter">
        <option value="0">All</option>
        <option value="6">6+</option>
        <option value="7">7+</option>
        <option value="8">8+</option>
        <option value="9">9+</option>
      </select>
    </div>

    <!-- Loading Spinner -->
    <div id="spinner" class="spinner hidden"></div>

    <!-- Main -->
    <main>

      <!-- Movie Grid -->
      <div id="movie-grid"></div>

      <!-- Watchlist -->
      <aside>
        <div class="watchlist-header">
          <h2>Saved Movies <span id="wl-count" class="wl-badge">0</span></h2>
          <button id="clear-watchlist" class="clear-btn" title="Clear all">✕ Clear</button>
        </div>
        <div id="watchlist"></div>
      </aside>

    </main>

    <!-- Pagination -->
    <div class="pagination" id="pagination">
      <button id="prev-page" class="page-btn" disabled>&#8249; Prev</button>
      <span id="page-info" class="page-info">Page 1</span>
      <button id="next-page" class="page-btn">Next &#8250;</button>
    </div>

  </div>

  <!-- Movie Detail Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <button id="modal-close" class="modal-close">&times;</button>
      <div class="modal-body">
        <img id="modal-poster" src="" alt="" />
        <div class="modal-info">
          <h2 id="modal-title"></h2>
          <p class="modal-meta" id="modal-meta"></p>
          <p class="modal-overview" id="modal-overview"></p>
          <div class="modal-actions">
            <button id="modal-watchlist-btn" class="modal-wl-btn">+ Add to Watchlist</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
